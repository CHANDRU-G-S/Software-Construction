trigger:
- main

# Uses your local computer instead of a cloud VM
pool:
  name: 'Default' 

variables:
  # Adjust this if your port is different (e.g., 5000 or 8080)
  PORT: 3000

steps:
# 1. Ensure Node.js is available
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Install Node.js'

# 2. Build the project
- powershell: |
    cd backend
    Write-Host "Installing dependencies..."
    npm install
    Write-Host "Building TypeScript..."
    npm run build
  displayName: 'npm install and build'

# 3. Start the server and KEEP IT OPEN
- powershell: |
    cd backend
    Write-Host "Starting Server on http://localhost:$(PORT)..."
    
    # Start node as a background process within this session
    $nodeProcess = Start-Process node -ArgumentList "dist/server.js" -PassThru -WindowStyle Hidden
    
    Write-Host "Server started with PID: $($nodeProcess.Id)"
    Write-Host "The pipeline will now stay active so you can visit the site."
    Write-Host "Navigate to http://localhost:$(PORT) in your browser."
    Write-Host "CLICK 'CANCEL' IN AZURE DEVOPS TO STOP THE SERVER WHEN FINISHED."

    # Infinite loop to keep the pipeline 'In Progress'
    while($true) {
        Start-Sleep -Seconds 60
        Write-Host "Server is still running... $(Get-Date)"
    }
  displayName: 'Run Server (Manual Stay-Alive)'
  workingDirectory: '$(Build.SourcesDirectory)/backend'
