trigger:
- main

pool:
  name: 'Default' 

steps:
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Install Node.js'

- powershell: |
    cd backend
    Write-Host "Installing dependencies..."
    npm install
  displayName: 'npm install'

- powershell: |
    cd backend
    
    # 1. Kill any old node processes so Port 3000 is free
    Stop-Process -Name "node" -Force -ErrorAction SilentlyContinue
    
    Write-Host "--- STARTING SERVER ---"
    Write-Host "Running node server.js from: $(Get-Location)"
    
    # 2. Run the file directly from the backend folder
    node server.js
  displayName: 'Run Server'
