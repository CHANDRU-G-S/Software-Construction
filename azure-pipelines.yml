trigger:
- main

pool:
  name: 'Default' 

steps:
- script: |
    cd backend
    npm install
    # Install ts-node locally so we can run .ts files directly
    npm install ts-node typescript --save-dev
  displayName: 'Install Dependencies'

- powershell: |
    cd backend
    
    # 1. Kill any old node processes to free up port 3000
    Stop-Process -Name "node" -Force -ErrorAction SilentlyContinue
    
    Write-Host "--- STARTING SERVER ---"
    
    # 2. Try to run with ts-node if you are using TypeScript
    # If your main file is actually 'index.ts' or 'app.ts', change the name here:
    npx ts-node server.ts
  displayName: 'Run Server (Direct Mode)'
