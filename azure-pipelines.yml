trigger:
- main

pool:
  name: 'Default' 

steps:
- script: |
    cd backend
    npm install
    npm run build
  displayName: '1. Build (Creates dist folder)'

- script: |
    cd backend
    echo "--- Checking if dist exists ---"
    dir dist
    
    echo "--- Starting Server ---"
    # Using the path relative to the 'backend' folder
    node dist/server.js
  displayName: '2. Run Server'
