trigger:
- main

pool:
  name: 'Default'

steps:
- task: UseNode@1
  inputs:
    version: '20.x'
  displayName: 'Install Node.js'

- powershell: |
    cd backend
    npm install
    # Check if k6 is installed on your PC, if not, install it
    if (!(Get-Command k6 -ErrorAction SilentlyContinue)) {
       Write-Host "k6 not found. Installing..."
       winget install k6 --accept-source-agreements --accept-package-agreements
    }
  displayName: 'Prepare Environment'

- powershell: |
    cd backend
    
    # 1. Kill any ghost node processes from previous runs
    Stop-Process -Name "node" -Force -ErrorAction SilentlyContinue
    
    Write-Host "Starting Server in the background..."
    # 2. Launch server.js (since you don't have a dist folder)
    $server = Start-Process node -ArgumentList "server.js" -PassThru -WindowStyle Hidden
    
    # 3. Give the Database 10 seconds to connect
    Start-Sleep -Seconds 10
    
    Write-Host "--- STARTING LOAD TEST ---"
    # 4. Run the k6 test
    k6 run load_test.js
    
    Write-Host "--- CLEANING UP ---"
    # 5. Shut down the server so the pipeline can finish
    Stop-Process -Id $server.Id -Force
  displayName: 'Start Server, Run Load Test, and Stop'
